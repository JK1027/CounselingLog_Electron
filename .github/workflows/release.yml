name: Release Build and Deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller pillow

      - name: Debug Before Build
        run: |
          echo "=== Root Directory ==="
          dir
          echo "=== Backend Directory ==="
          dir backend
          echo "=== Assets Directory ==="
          dir assets

      - name: Build Python Backend (PyInstaller)
        run: |
          python backend/build_backend.py

      - name: Debug After Build
        run: |
          echo "=== Electron Resources Directory ==="
          dir electron/resources/backend

      - name: Upload PyInstaller Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-build-logs
          path: |
            backend/build/
            backend/dist/
            backend/backend.spec

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build Frontend (React)
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Install and Package Electron App
        working-directory: ./electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm ci
          npx electron-builder --win --publish always
